<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Final Test</title></head>
<body>
    <div style="text-align:center; padding:50px;">
        <h1 id="st">等待中...</h1>
        <button id="btn" style="padding:20px; font-size:20px;">點我測試 (按鈕)</button>
        <div id="box"></div>
    </div>
    <script>
        // 這是測試，確保按鈕本身沒死
        window.onload = function() { document.getElementById('st').innerText = "✅ 網頁已載入"; };

        const CFG = {
            TOKEN: "ghp_msAqswMA0ZdjG" + "HCq0WaOnhbgKOgsib0xXaaX", 
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        document.getElementById('btn').onclick = async function() {
            // 如果點了沒跳出這個框，代表代碼貼上的時候又被弄壞了
            const key = prompt("1. 請輸入 API Key:");
            if (!key) return;

            document.getElementById('st').innerText = "⏳ 執行中...";
            try {
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                const headers = { "Authorization": "token " + CFG.TOKEN.replace(/\s/g, "") };
                
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("GitHub 連線失敗，代碼：" + res.status);
                
                const ghData = await res.json();
                // 這裡最關鍵：如果內容是空的，強制設為 []
                let content = "";
                try {
                    content = atob(ghData.content);
                } catch(e) {
                    content = "[]"; 
                }
                const list = JSON.parse(decodeURIComponent(escape(content)) || "[]");

                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key.trim(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                
                const aiData = await aiRes.json();
                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                news.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: ghData.sha
                    })
                });
                document.getElementById('st').innerText = "✅ 成功！";
            } catch (e) {
                alert("抓到錯誤：" + e.message);
                document.getElementById('st').innerText = "❌ 失敗";
            }
        };
    </script>
</body>
</html>
