<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WordsUp Final</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f1f5f9; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌍 AI 英文單字 (兼容版)</h2>
        <div id="st">GitHub 已通 ✅ 準備連線 AI</div>
        <button class="btn" onclick="run()">生產單字</button>
        <div id="box" style="margin-top:20px; text-align:left;"></div>
    </div>

    <script>
        // 這是你截圖中測試成功的 Key
        const API_KEY = "AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow"; 
        const TOKEN = "ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM"; 
        const USER = "nt2bpf2w6g-ctrl";
        const REPO = "my-eng-app";

        async function run() {
            const st = document.getElementById('st');
            st.innerText = "⏳ 正在突破連線限制...";
            
            try {
                // 1. 取得 GitHub 資料 (剛才測試已通)
                const ghUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/words.json`;
                const res = await fetch(ghUrl, { headers: { "Authorization": `token ${TOKEN}` } });
                const ghData = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(ghData.content))));

                // 2. 呼叫 AI (加上防阻擋參數)
                const aiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
                const aiRes = await fetch(aiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }, // 明確指定格式
                    body: JSON.stringify({ contents: [{ parts: [{ text: "提供5個英文單字，只要JSON陣列: [{'word':'apple','def':'fruit','trans':'蘋果'}]" }] }] })
                });

                if (!aiRes.ok) throw new Error("AI 連線被擋，請換個 Wi-Fi 或關閉 VPN");
                
                const aiData = await aiRes.json();
                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const newWords = JSON.parse(raw);

                // 3. 顯示與存回
                newWords.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b> - ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                await fetch(ghUrl, {
                    method: "PUT",
                    headers: { "Authorization": `token ${TOKEN}` },
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(newWords))))),
                        sha: ghData.sha
                    })
                });
                st.innerText = "✅ 成功！";
            } catch (e) {
                alert("錯誤：" + e.message);
                st.innerText = "❌ 連線失敗 (建議換網路環境試試)";
            }
        }
    </script>
</body>
</html>
