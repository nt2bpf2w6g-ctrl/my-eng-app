<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WordsUp</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f1f5f9; }
        .btn { width: 100%; max-width: 300px; padding: 20px; background: #2563eb; color: white; border-radius: 15px; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <h1>🌍 AI WordsUp</h1>
    <div id="st">正在啟動偵測器...</div>
    <button class="btn" id="runBtn" onclick="main()">生產新單字</button>
    <div id="display" style="margin-top:20px;"></div>

    <script>
        // 1. 自動偵測結構是否正確
        window.onload = function() {
            document.getElementById('st').innerText = "✅ 系統載入成功，請點擊按鈕！";
        };

        const CONFIG = {
            API_KEY:"AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
            TOKEN:"ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",
            USER:"nt2bpf2w6g-ctrl",
            REPO:"my-eng-app"
        };

        async function main() {
            const btn = document.getElementById('runBtn');
            const st = document.getElementById('st');
            const box = document.getElementById('display');
            
            btn.disabled = true;
            st.innerText = "⏳ 正在與 AI 通訊...";

            try {
                // 讀取 GitHub
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const headers = { "Authorization": "token " + CONFIG.TOKEN.trim() };
                const res = await fetch(url, { headers });
                const gh = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(gh.content))));

                // 呼叫 AI
                const prompt = "提供5個英文單字，只要JSON陣列: [{'word':'...','def':'...','trans':'...'}]";
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const aiData = await aiRes.json();
                const rawText = aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const newWords = JSON.parse(rawText);

                // 顯示介面
                newWords.forEach(w => {
                    const d = document.createElement('div');
                    d.style = "background:white; padding:15px; margin-bottom:10px; border-radius:10px; text-align:left; border:1px solid #ddd;";
                    d.innerHTML = `<b>${w.word}</b><br><small>${w.trans}</small>`;
                    box.prepend(d);
                });

                // 存回 GitHub
                st.innerText = "💾 正在同步...";
                const updated = list.concat(newWords);
                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updated)))),
                        sha: gh.sha
                    })
                });
                st.innerText = "✅ 完成！";

            } catch (e) {
                alert("錯誤：" + e.message);
                st.innerText = "❌ 失敗";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
