<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordsUp Debug</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛠️ 系統診斷中</h1>
        <div id="status">讀取中...</div>
        <button onclick="check()" style="padding:10px 20px; margin-top:20px;">測試按鈕</button>
    </div>

    <script>
        // 設定區域
        const CONFIG = {
            API_KEY: "AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
            TOKEN: "ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        // 初始化檢查
        window.onload = function() {
            document.getElementById('status').innerText = "✅ 代碼結構正確，請點擊測試按鈕。";
        };

        async function check() {
            const status = document.getElementById('status');
            status.innerText = "⏳ 正在測試連線...";
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`, {
                    headers: { "Authorization": "token " + CONFIG.TOKEN.replace(/\s/g, '') }
                });
                if (res.ok) {
                    status.innerText = "🚀 GitHub 連線成功！";
                } else {
                    status.innerText = "❌ 連線失敗：" + res.status;
                }
            } catch (e) {
                status.innerText = "❌ 錯誤：" + e.message;
            }
        }
    </script>
</body>
</html>
