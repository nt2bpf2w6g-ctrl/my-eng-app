<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordsUp OK</title>
</head>
<body style="text-align:center; padding-top:50px; background:#eee;">
    <div style="background:white; display:inline-block; padding:30px; border-radius:20px;">
        <h2 id="st">✅ 系統已就緒</h2>
        <button id="btn" onclick="run()" style="font-size:24px; padding:15px 30px;">生產單字</button>
        <div id="box" style="margin-top:20px; text-align:left;"></div>
    </div>

<script>
const CFG = {
    // 這是你截圖中的 KEY
    k:"AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
    // 請直接填入完整的 ghp... 鑰匙
    t:"ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",
    u:"nt2bpf2w6g-ctrl",
    r:"my-eng-app"
};

async function run() {
    const btn = document.getElementById('btn');
    const st = document.getElementById('st');
    const box = document.getElementById('box');
    
    btn.disabled = true;
    st.innerText = "⏳ 處理中...";

    try {
        // 1. 抓 GitHub
        const url = "https://api.github.com/repos/"+CFG.u+"/"+CFG.r+"/contents/words.json";
        const h = { "Authorization": "token " + CFG.t.trim() };
        const res = await fetch(url, { headers: h });
        const gh = await res.json();
        const list = JSON.parse(decodeURIComponent(escape(atob(gh.content))));

        // 2. 叫 AI
        const aiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CFG.k;
        const aiRes = await fetch(aiUrl, {
            method: "POST",
            body: JSON.stringify({ contents: [{ parts: [{ text: "提供5個英文單字,JSON格式:[{'word':'...','trans':'...'}]" }] }] })
        });
        const aiData = await aiRes.json();
        const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
        const newWords = JSON.parse(raw);

        // 3. 顯示
        newWords.forEach(w => {
            const d = document.createElement('div');
            d.innerHTML = "<b>"+w.word+"</b>: "+w.trans;
            box.prepend(d);
        });

        // 4. 存回
        const updated = list.concat(newWords);
        await fetch(url, {
            method: "PUT",
            headers: h,
            body: JSON.stringify({
                message: "up",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(updated)))),
                sha: gh.sha
            })
        });
        st.innerText = "✅ 完成";

    } catch (e) {
        alert("出錯: " + e.message);
        st.innerText = "❌ 失敗";
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
