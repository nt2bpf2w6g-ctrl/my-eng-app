<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>抓鬼專用</title>
</head>
<body>
    <button id="btn" style="padding:50px; font-size:30px;" onclick="debug()">點我抓鬼</button>
    <div id="log" style="margin-top:20px; color:red; font-family:monospace; white-space:pre;"></div>

    <script>
        function debug() {
            const log = document.getElementById('log');
            log.innerText = "開始檢查...\n";
            try {
                // --- 檢查區 ---
                const CONFIG = {
                    API_KEY:"AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
                    TOKEN:"ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",
                    USER:"nt2bpf2w6g-ctrl",
                    REPO:"my-eng-app"
                };

                log.innerText += "1. 代碼語法檢查: OK\n";
                log.innerText += "2. 正在連線 GitHub...\n";

                fetch(`https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`, {
                    headers: { "Authorization": "token " + CONFIG.TOKEN.trim() }
                })
                .then(res => {
                    log.innerText += "3. GitHub 回傳碼: " + res.status + "\n";
                    if(res.ok) {
                        log.innerText += "✅ 連線成功！你的 Token 和帳號都對了。\n";
                        log.innerText += "4. 正在測試 AI...\n";
                        return fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY);
                    } else {
                        log.innerText += "❌ 連線失敗。請檢查帳號、倉庫名、Token權限。\n";
                    }
                })
                .then(aiRes => aiRes.json())
                .then(aiData => {
                    if(aiData.error) {
                        log.innerText += "❌ AI 報錯: " + aiData.error.message + "\n";
                    } else {
                        log.innerText += "🚀 AI 反應成功！恭喜！";
                    }
                })
                .catch(e => {
                    log.innerText += "⚠️ 發生異常: " + e.message + "\n";
                });

            } catch (err) {
                log.innerText += "🚨 語法致命錯誤: " + err.message + "\n";
                log.innerText += "提示：請檢查你的引號是否為直引號，以及 + 號是否正確。";
            }
        }
    </script>
</body>
</html>
