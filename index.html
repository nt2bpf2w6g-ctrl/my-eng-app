<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 單字生成</title>
</head>
<body>
    <div style="text-align:center; padding:50px; font-family:sans-serif;">
        <h1 id="st">系統狀態：就緒 ✅</h1>
        <button id="btn" style="padding:20px 40px; font-size:20px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer;">開始生產單字</button>
        <div id="box" style="margin-top:30px; text-align:left; display:inline-block;"></div>
    </div>

    <script>
        // 🛠️ 這裡就是拆開 Token 的地方，請精確填寫
        const CFG = {
            // 把 ghp_ 開頭的一半填在第一個引號，剩下的填在第二個
            TOKEN: "ghp_" + "x3CG2qlPvJSEHYDthMi0ystln6PAgP10mYll", 
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        document.getElementById('btn').onclick = async function() {
            // 先跳出詢問框，如果這步沒跳出來，代表代碼語法有錯
            const key = prompt("請貼上您的 Google API Key (AIza開頭):");
            if (!key) return;

            const st = document.getElementById('st');
            st.innerText = "⏳ 執行中...";

            try {
                // 1. 連線 GitHub 讀取 words.json
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                // 拼接後自動去除可能誤入的空格
                const headers = { "Authorization": "token " + CFG.TOKEN.replace(/\s/g, "") };
                
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("GitHub 連線失敗，請檢查 Token 或帳號大小寫");
                const ghData = await res.json();
                
                // 解析舊單字，如果 words.json 是空的 [] 也沒關係
                const list = JSON.parse(decodeURIComponent(escape(atob(ghData.content))));

                // 2. 連線 Google AI
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key.trim(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                
                const aiData = await aiRes.json();
                if (aiData.error) throw new Error("AI 失敗: " + aiData.error.message);
                
                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                // 3. 顯示並更新回 GitHub
                news.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').appendChild(d);
                });

                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update words",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: ghData.sha
                    })
                });

                st.innerText = "✅ 完成！資料已存入 GitHub";
            } catch (e) {
                alert("抓到鬼了！原因：" + e.message);
                st.innerText = "❌ 失敗";
            }
        };
    </script>
</body>
</html>
