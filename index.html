<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI 單字生成 (極簡版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🌍 AI 英文單字生成</h1>
    <h2 id="st">系統已就緒</h2>
    <button class="btn" onclick="run()">點我開始生成</button>
    <div id="box" style="margin-top:20px; text-align:left; display:inline-block;"></div>

    <script>
        async function run() {
            // 直接彈出兩個詢問框，把最麻煩的 Key 都手動貼入
            const ghToken = prompt("1. 請貼上 GitHub Token (ghp_開頭):");
            if (!ghToken) return;
            
            const aiKey = prompt("2. 請貼上 Google API Key (AIza開頭):");
            if (!aiKey) return;

            const st = document.getElementById('st');
            st.innerText = "⏳ 執行中...";

            try {
                const CFG = { USER: "nt2bpf2w6g-ctrl", REPO: "my-eng-app" };
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                
                // 1. 讀取 GitHub
                const res = await fetch(url, { headers: { "Authorization": "token " + ghToken.trim() } });
                if (!res.ok) throw new Error("GitHub Token 錯誤或權限未開");
                const ghData = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(ghData.content))));

                // 2. AI 生成
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + aiKey.trim(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                const aiData = await aiRes.json();
                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                // 3. 顯示與存回
                news.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": "token " + ghToken.trim() },
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: ghData.sha
                    })
                });
                st.innerText = "✅ 成功！";
            } catch (e) {
                alert("錯誤：" + e.message);
                st.innerText = "❌ 失敗";
            }
        }
    </script>
</body>
</html>
