<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WordsUp Final</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f1f5f9; text-align: center; padding: 20px; color: #1e293b; }
        .container { max-width: 400px; margin: auto; }
        .btn { width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #cbd5e1; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 12px; border: 1px solid #e2e8f0; text-align: left; }
        #st { margin: 10px 0; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 AI WordsUp</h1>
        <div id="st">系統已就緒 ✅</div>
        <button class="btn" id="runBtn" onclick="main()">生產 5 個 AI 新單字</button>
        <div id="display" style="margin-top:20px;"></div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "AIzaSyDArmPvsfmuK4HkVjeSLfMClZqXOqM6uEU", 
            TOKEN: "ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",   
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function main() {
            const btn = document.getElementById('runBtn');
            const st = document.getElementById('st');
            const box = document.getElementById('display');

            btn.disabled = true;
            st.innerText = "⏳ 正在處理中...";
            box.innerHTML = '';

            try {
                // 1. 取得 GitHub 檔案
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const ghRes = await fetch(url, { 
                    headers: { "Authorization": `token ${CONFIG.TOKEN.trim()}` } 
                });
                if (!ghRes.ok) throw new Error("GitHub 連線失敗，請檢查 Token");
                
                const ghData = await ghRes.json();
                let list = [];
                try {
                    list = JSON.parse(decodeURIComponent(escape(atob(ghData.content.replace(/\n/g, '')))) || "[]");
                } catch (e) { list = []; }

                // 2. 呼叫 Gemini AI (最穩定的 v1 請求)
                st.innerText = "🤖 AI 正在思考...";
                const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: 'Give me 5 travel English words. Return ONLY a JSON array, no other text. Format: [{"word":"hello","def":"a greeting","trans":"你好"}]' }] 
                        }]
                    })
                });

                if (!aiRes.ok) {
                    const err = await aiRes.json();
                    throw new Error(`AI 錯誤: ${err.error ? err.error.message : aiRes.status}`);
                }

                const aiData = await aiRes.json();
                const rawText = aiData.candidates[0].content.parts[0].text;

                // 3. 穩健解析：從文字中抓取 JSON 部分
                const jsonMatch = rawText.match(/\[[\s\S]*\]/);
                if (!jsonMatch) throw new Error("AI 回傳格式不正確");
                const newWords = JSON.parse(jsonMatch[0]);

                // 4. 顯示與存回
                newWords.forEach(w => {
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.innerHTML = `<b>${w.word}</b><br><small>${w.def}</small><div style="color:#059669;margin-top:5px;">${w.trans}</div>`;
                    box.prepend(d);
                });

                st.innerText = "💾 正在存回雲端...";
                const updatedList = list.concat(newWords);
                const updatedBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(updatedList))));

                await fetch(url, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `token ${CONFIG.TOKEN.trim()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "AI Update",
                        content: updatedBase64,
                        sha: ghData.sha
                    })
                });

                st.innerText = "✅ 同步成功！";
            } catch (e) {
                console.error(e);
                st.innerText = "❌ 錯誤: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
