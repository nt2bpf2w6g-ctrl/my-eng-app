<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Words</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { width: 100%; padding: 20px; background: #2563eb; color: white; border-radius: 12px; font-size: 20px; border: none; }
    </style>
</head>
<body>
    <h2 id="st">✅ 系統已就緒</h2>
    <button class="btn" onclick="main()">點我生產單字</button>
    <div id="box" style="margin-top:20px; text-align:left;"></div>

    <script>
        const CFG = {
            TOKEN: "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", 
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function main() {
            const key = prompt("請貼上 Google API Key:");
            if (!key) return;

            document.getElementById('st').innerText = "⏳ 執行中...";
            try {
                // 1. 讀取 GitHub ( words.json 必須是 [] )
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                const res = await fetch(url, { headers: { "Authorization": "token " + CFG.TOKEN.trim() } });
                const gh = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(gh.content))));

                // 2. AI 生產
                const ai = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key.trim(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                const data = await ai.json();
                const raw = data.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                // 3. 顯示與存回
                news.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": "token " + CFG.TOKEN.trim() },
                    body: JSON.stringify({
                        message: "up",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: gh.sha
                    })
                });
                document.getElementById('st').innerText = "✅ 成功！";
            } catch (e) {
                alert("錯誤：" + e.message);
                document.getElementById('st').innerText = "❌ 失敗";
            }
        }
    </script>
</body>
</html>
