<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI 單字生成</title>
</head>
<body>
    <div style="text-align:center; padding:50px; font-family:sans-serif;">
        <h1 id="st">系統狀態：就緒 ✅</h1>
        <button id="btn" style="padding:20px 40px; font-size:18px; cursor:pointer;">1. 生產單字 (點我)</button>
        <div id="box" style="margin-top:30px; text-align:left; display:inline-block;"></div>
    </div>

    <script>
        // 🛠️ 這裡請精確填寫，不要有多餘符號
        const CFG = {
            TOKEN: "ghp_" + "x3CG2qlPvJSEHYDthMi0ystln6PAgP10mYll", 
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        // 監聽按鈕點擊
        document.getElementById('btn').onclick = async function() {
            // 第一步：先跳出 API Key 輸入框
            const key = prompt("2. 請貼上 Google API Key (AIza開頭):");
            if (!key) return;

            const st = document.getElementById('st');
            st.innerText = "⏳ 執行中...";

            try {
                // 1. 連線 GitHub 讀取 words.json
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                const headers = { "Authorization": "token " + CFG.TOKEN.replace(/\s/g, "") };
                
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("GitHub 連線失敗，請檢查 Token");
                const ghData = await res.json();
                
                // 解析內容，如果 words.json 毀損就重開 []
                let list = [];
                try {
                    list = JSON.parse(decodeURIComponent(escape(atob(ghData.content))));
                } catch(e) { list = []; }

                // 2. 連線 Google Gemini API
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key.trim(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                
                const aiData = await aiRes.json();
                if (aiData.error) throw new Error("AI 金鑰錯誤: " + aiData.error.message);
                
                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                // 3. 更新畫面
                news.forEach(w => {
                    const d = document.createElement('div');
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                // 4. 存回 GitHub
                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: ghData.sha
                    })
                });

                st.innerText = "✅ 完成！資料已同步";
            } catch (e) {
                alert("錯誤原因：" + e.message);
                st.innerText = "❌ 失敗";
            }
        };
    </script>
</body>
</html>
