<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI WordsUp Final</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f1f5f9; }
        .btn { width: 100%; max-width: 300px; padding: 20px; background: #2563eb; color: white; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>🌍 AI 單字生成器</h1>
    <div id="st" style="margin-bottom:20px;">系統已就緒</div>
    <button class="btn" onclick="run()">生產新單字</button>
    <div id="box" style="margin-top:20px; text-align:left; max-width:400px; margin-left:auto; margin-right:auto;"></div>

    <script>
        const CFG = {
            // 請直接填入你電腦上測試過的一段式完整資料
            TOKEN:"ghp_x3CG2qlPvJSEH"+"YDthMi0ystln6PAgP10mYll",
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function run() {
            const st = document.getElementById('st');
            const key = prompt("請貼上 Google API Key:");
            if (!key) return;

            st.innerText = "⏳ 正在處理中...";
            try {
                const url = `https://api.github.com/repos/${CFG.USER}/${CFG.REPO}/contents/words.json`;
                const headers = { "Authorization": `token ${CFG.TOKEN.trim()}` };

                // 1. 取得資料 (增加防錯處理)
                const res = await fetch(url, { headers });
                let list = [];
                let sha = "";
                
                if (res.ok) {
                    const ghData = await res.json();
                    sha = ghData.sha;
                    try {
                        list = JSON.parse(decodeURIComponent(escape(atob(ghData.content))));
                    } catch(e) { list = []; } // 如果 JSON 壞了，就重開一個新的 []
                }

                // 2. 呼叫 AI
                const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key.trim()}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON 5 words: [{'word':'apple','trans':'蘋果'}]" }] }] })
                });
                const aiData = await aiRes.json();
                if (aiData.error) throw new Error(aiData.error.message);

                const raw = aiData.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim();
                const news = JSON.parse(raw);

                // 3. 顯示結果
                news.forEach(w => {
                    const d = document.createElement('div');
                    d.style = "background:white; padding:10px; margin-bottom:5px; border-radius:8px;";
                    d.innerHTML = `<b>${w.word}</b>: ${w.trans}`;
                    document.getElementById('box').prepend(d);
                });

                // 4. 強制寫回 GitHub
                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list.concat(news))))),
                        sha: sha
                    })
                });
                st.innerText = "✅ 完成！資料已存入 GitHub";
            } catch (e) {
                alert("抓到鬼了！原因：" + e.message);
                st.innerText = "❌ 失敗";
            }
        }
    </script>
</body>
</html>
