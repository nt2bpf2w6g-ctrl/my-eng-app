<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #btn { padding: 20px; font-size: 20px; background: blue; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <button id="btn" onclick="check()">測試連線</button>
    <h1 id="out">等待測試...</h1>

    <script>
        function check() {
            const out = document.getElementById('out');
            try {
                // --- 這裡請「極度小心」填寫 ---
                const CONFIG = {
                    API_KEY: "AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
                    TOKEN: "你的新Token前半" + "你的新Token後半",
                    USER: "nt2bpf2w6g-ctrl",
                    REPO: "my-eng-app"
                };

                if (CONFIG.TOKEN.includes("填")) {
                    out.innerText = "❌ 你還沒填入 Token 吧？";
                    return;
                }

                out.innerText = "✅ 代碼格式正確！正在嘗試呼叫 AI...";
                
                fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY)
                    .then(r => r.json())
                    .then(data => {
                        if (data.error) {
                            out.innerText = "❌ API Key 失敗：" + data.error.message;
                        } else {
                            out.innerText = "🚀 AI 有反應！格式與 Key 都對了！";
                        }
                    })
                    .catch(e => {
                        out.innerText = "❌ 網路連線有問題";
                    });

            } catch (err) {
                out.innerText = "❌ 語法錯誤：" + err.message;
            }
        }
    </script>
</body>
</html>
