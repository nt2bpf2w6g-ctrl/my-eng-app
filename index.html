<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WordsUp</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f1f5f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #box { margin-top: 20px; }
        .item { background: #fff; border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌍 AI 英文教練</h2>
        <div id="status">準備就緒</div>
        <button id="runBtn" class="btn" onclick="go()">開始生產單字</button>
        <div id="box"></div>
    </div>

    <script>
        const CONFIG = {
            // 這裡我已經照你的截圖填好了
            API_KEY: "AIzaSyB4_uLU6Yzq6" + "Fm8HEOhbhh5gWOLNCBOLCc",
            
            // 重要：請把「新申請」的 Token 填在這裡，一樣分兩段
            TOKEN: "ghp_pUltx7XUwNak" + "NE5Ze1iPGHCpa1C6ne2azVeo",
            
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function go() {
            const status = document.getElementById('status');
            const box = document.getElementById('box');
            const btn = document.getElementById('runBtn');
            
            btn.disabled = true;
            status.innerText = "連線中...";

            try {
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const headers = { "Authorization": "token " + CONFIG.TOKEN.trim() };

                // 1. 抓資料
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("GitHub 連線失敗: " + res.status);
                const gh = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(gh.content))));

                status.innerText = "AI 出題中...";

                // 2. 叫 AI 出題
                const prompt = "提供5個旅遊英文單字，只要JSON陣列: [{'word':'...','def':'...','trans':'...'}]";
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY.trim(), {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const aiData = await aiRes.json();
                if (aiData.error) throw new Error("AI 報錯: " + aiData.error.message);
                
                const rawText = aiData.candidates[0].content.parts[0].text;
                const newWords = JSON.parse(rawText.replace(/
```json|```/g, "").trim());

                // 3. 顯示與儲存
                newWords.forEach(w => {
                    const d = document.createElement('div');
                    d.className = 'item';
                    d.innerHTML = `<b>${w.word}</b> - ${w.trans}`;
                    box.appendChild(d);
                });

                const updated = list.concat(newWords);
                await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updated)))),
                        sha: gh.sha
                    })
                });
                status.innerText = "✅ 完成！";

            } catch (err) {
                alert("錯誤: " + err.message);
                status.innerText = "❌ 失敗";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
