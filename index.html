<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI WordsUp</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .btn { width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #cbd5e1; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; text-align: left; }
        #st { margin: 10px 0; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 AI WordsUp</h1>
        <div id="st">系統已就緒 ✅</div>
        <button class="btn" id="runBtn" onclick="main()">生產 5 個新單字</button>
        <div id="display" style="margin-top:20px;"></div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "AIzaSyCEo2jDn_RPHaXj" + "MvauUm4XHqCOgRMnSow",
            TOKEN: "ghp_o5BuUUXNi9TaIQzRK87Y" + "M6acDm0FPM00QEOM",
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function main() {
            const btn = document.getElementById('runBtn');
            const st = document.getElementById('st');
            const box = document.getElementById('display');

            btn.disabled = true;
            box.innerHTML = '';
            st.innerText = "⏳ 正在處理中...";

            try {
                // 1. 取得 GitHub 檔案
                st.innerText = "📡 連線 GitHub...";
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const headers = {
                    "Authorization": "token " + CONFIG.TOKEN.trim(),
                    "Content-Type": "application/json"
                };

                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("GitHub 失敗：" + res.status);

                const gh = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(gh.content.replace(/\n/g, '')))));

                // 2. 呼叫 Gemini AI
                st.innerText = "🤖 AI 生產單字中...";
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: 'Give me 5 travel English words. Reply ONLY a JSON array, no explanation, no markdown. Format: [{"word":"hello","def":"a greeting","trans":"你好"}]'
                            }]
                        }]
                    })
                });
                if (!aiRes.ok) throw new Error("AI 失敗：" + aiRes.status);

                const aiData = await aiRes.json();
                const raw = aiData.candidates[0].content.parts[0].text;

                // 抓出 JSON 陣列（支援全形括號）
                const match = raw.match(/[\[［][\s\S]*[\]］]/);
                if (!match) throw new Error("AI格式錯誤：" + raw.substring(0, 80));
                const cleaned = match[0]
                    .replace(/［/g, "[").replace(/］/g, "]")
                    .replace(/｛/g, "{").replace(/｝/g, "}")
                    .replace(/：/g, ":").replace(/，/g, ",")
                    .replace(/「/g, '"').replace(/」/g, '"')
                    .replace(/'/g, '"').replace(/'/g, '"');
                const newWords = JSON.parse(cleaned);

                // 3. 顯示結果
                newWords.forEach(w => {
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.innerHTML = `<b>${w.word}</b><br><small>${w.def}</small><div style="color:#059669;margin-top:5px;">${w.trans}</div>`;
                    box.prepend(d);
                });

                // 4. 儲存回 GitHub
                st.innerText = "💾 儲存中...";
                const updated = list.concat(newWords);
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "update words",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updated)))),
                        sha: gh.sha
                    })
                });
                if (!putRes.ok) throw new Error("儲存失敗：" + putRes.status);

                st.innerText = "✅ 完成！共 " + updated.length + " 個單字";

            } catch (e) {
                st.innerText = "❌ " + e.message;
                box.innerHTML = '<div class="card" style="color:red;word-break:break-all;">' + e.message + '</div>';
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
