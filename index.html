<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 單字教練</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f1f5f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .word-card { background: #fff; border: 2px solid #e2e8f0; padding: 20px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
        .word { font-size: 24px; font-weight: bold; }
        .trans { color: #059669; font-weight: bold; display: none; margin-top: 10px; }
        #status { font-size: 13px; color: #64748b; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>WordsUp</h1>
        <div id="status">準備就緒</div>
        <button id="genBtn" class="btn" onclick="run()">生產新字卡</button>
        <div id="box"></div>
    </div>

    <script>
        // --- iPad 填寫區：請確保引號中間沒有多餘空格 ---
        const CONFIG = {
            API_KEY: "AIzaSyCX81ohv8BaviqcbaUGO0DWQsO7MC9X2NA".trim(),
            TOKEN: "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".trim(),
            USER: "nt2bpf2w6g-ctrl".trim(),
            REPO: "my-eng-app".trim()
        };

        async function run() {
            const status = document.getElementById('status');
            const box = document.getElementById('box');
            const btn = document.getElementById('genBtn');
            
            btn.disabled = true;
            status.innerText = "正在連線 GitHub...";
            box.innerHTML = "";

            try {
                const url = "https://api.github.com/repos/" + CONFIG.USER + "/" + CONFIG.REPO + "/contents/words.json";
                const res = await fetch(url, { headers: { "Authorization": "token " + CONFIG.TOKEN } });
                
                if (!res.ok) throw new Error("連線失敗(代碼:" + res.status + ")，請檢查帳號大小寫與Token權限");

                const gh = await res.json();
                const list = JSON.parse(atob(gh.content));
                status.innerText = "AI 正在出題...";

                const prompt = "提供5個生活旅遊英文單字，避開[" + list.map(i=>i.word).join(",") + "]，只給JSON: " + '[{"word":"...","def":"...","trans":"..."}]';
                const aiRes = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + CONFIG.API_KEY, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const aiData = await aiRes.json();
                const words = JSON.parse(aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

                words.forEach(w => {
                    const d = document.createElement('div');
                    d.className = 'word-card';
                    d.onclick = function() { 
                        this.querySelector('.trans').style.display = 'block';
                        const m = new SpeechSynthesisUtterance(w.word); m.lang = 'en-US'; window.speechSynthesis.speak(m);
                    };
                    d.innerHTML = '<div class="word">' + w.word + ' 🔊</div><div style="font-size:12px;color:#666">' + w.def + '</div><div class="trans">' + w.trans + '</div>';
                    box.appendChild(d);
                });

                status.innerText = "正在同步雲端...";
                const newList = list.concat(words);
                await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": "token " + CONFIG.TOKEN },
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(newList)))),
                        sha: gh.sha
                    })
                });
                status.innerText = "✅ 完成！點擊卡片看翻譯與發音";

            } catch (e) {
                alert("報錯了：" + e.message);
                status.innerText = "❌ 失敗";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
