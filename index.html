<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 單字教練</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--p); font-size: 26px; margin-bottom: 5px; }
        #status { font-size: 13px; color: #64748b; margin-bottom: 20px; height: 1.2em; }
        .btn { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,0.2); transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn:disabled { background: #cbd5e1; box-shadow: none; }
        .card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; animation: slideUp 0.4s ease-out; cursor: pointer; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .word { font-size: 28px; font-weight: 800; color: #0f172a; margin-bottom: 5px; }
        .def { font-size: 14px; color: #64748b; line-height: 1.4; }
        .trans { margin-top: 15px; padding-top: 15px; color: #059669; font-size: 20px; font-weight: bold; border-top: 1px dashed #e2e8f0; display: none; }
        .hint { font-size: 11px; color: #cbd5e1; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 AI WordsUp</h1>
        <div id="status">準備好學習新單字了嗎？</div>
        <button class="btn" id="runBtn" onclick="startApp()">生產 5 個新字卡</button>
        <div id="display" style="margin-top:20px;"></div>
    </div>

    <script>
        // --- 核心設定區 (已為老哥填好) ---
        const CONFIG = {
            API_KEY: "AIzaSyCX8" + "1ohv8BaviqcbaUGO0DWQsO7MC9X2NA", 
            
            // 重要：請在此處分段填入你「新申請」的 Token
            // 範例：TOKEN: "ghp_ABC" + "DEF" + "GHI",
            TOKEN: "這裡填新Token開頭" + "這裡填中間" + "這裡填結尾",
            
            USER: "nt2bpf2w6g-ctrl",
            REPO: "my-eng-app"
        };

        async function startApp() {
            const btn = document.getElementById('runBtn');
            const status = document.getElementById('status');
            const display = document.getElementById('display');
            
            btn.disabled = true;
            status.innerText = "⏳ 正在連線 GitHub 資料庫...";
            display.innerHTML = "";

            try {
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const headers = { "Authorization": `token ${CONFIG.TOKEN.replace(/\s/g, '')}`, "Accept": "application/vnd.github.v3+json" };

                // 1. 抓取舊資料
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error(`GitHub 連線失敗(${res.status})，請確認新 Token 是否正確填寫。`);

                const gh = await res.json();
                const list = JSON.parse(decodeURIComponent(escape(atob(gh.content))));
                status.innerText = "🤖 AI 正在選取旅遊高頻單字...";

                // 2. 呼叫 AI
                const prompt = `提供5個成人旅遊英文單字，避開[${list.map(i=>i.word).join(',')}], 只回傳JSON陣列: [{"word":"...","def":"...","trans":"..."}]`;
                const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const aiData = await aiRes.json();
                const newWords = JSON.parse(aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

                // 3. 渲染字卡
                newWords.forEach(w => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = function() {
                        this.querySelector('.trans').style.display = 'block';
                        this.querySelector('.hint').style.display = 'none';
                        window.speechSynthesis.cancel();
                        const m = new SpeechSynthesisUtterance(w.word); m.lang = 'en-US'; window.speechSynthesis.speak(m);
                    };
                    card.innerHTML = `<div class="word">${w.word} 🔊</div><div class="def">${w.def}</div><div class="trans">${w.trans}</div><div class="hint">點擊發音並查看翻譯</div>`;
                    display.appendChild(card);
                });

                // 4. 回傳儲存
                status.innerText = "💾 正在同步學習進度...";
                const updated = list.concat(newWords);
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify({
                        message: "Sync New Words",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updated)))),
                        sha: gh.sha
                    })
                });

                if (!putRes.ok) throw new Error("存檔失敗，請確認 Token 權限。");
                status.innerText = "✅ 單字生產完畢！點擊卡片開始練習。";

            } catch (e) {
                alert("❌ 操作失敗：\n" + e.message);
                status.innerText = "❌ 發生錯誤";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
