<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英文助手</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #2563eb; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
        .quiz { margin-top: 20px; text-align: left; padding: 15px; background: #fafafa; border-radius: 10px; border-left: 5px solid #2563eb; }
        .word { font-size: 24px; font-weight: bold; margin: 0; }
        .ans { color: #059669; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 AI 單字產生器</h2>
        <button class="btn" id="go" onclick="run()">生產 5 個單字</button>
        <div id="status">點擊按鈕開始</div>
        <div id="box"></div>
        <button id="showBtn" class="btn" style="display:none; background:#334155; margin-top:10px;" onclick="show()">看答案</button>
    </div>

    <script>
        // --- 設定區 ---
        const CONFIG = {
            GEMINI_KEY: "AIzaSyCX81ohv8BaviqcbaUGO0DWQsO7MC9X2NA",
            GH_TOKEN: "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", 
            GH_USER: "nt2bpf2w6g-ctrl",
            GH_REPO: "my-eng-app"
        };

        async function run() {
            const btn = document.getElementById('go');
            const status = document.getElementById('status');
            const box = document.getElementById('box');
            
            btn.disabled = true;
            status.innerText = "正在連線 GitHub...";
            box.innerHTML = "";

            try {
                // 1. 抓取資料
                const url = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/contents/words.json`;
                const res = await fetch(url, { headers: { Authorization: `token ${CONFIG.TOKEN}` } });
                if (!res.ok) throw new Error("GitHub 連線失敗，請檢查 Token 或 Repo 是否設為 Public");
                
                const gh = await res.json();
                const list = JSON.parse(atob(gh.content));
                const oldWords = list.map(i => i.word).join(',');

                status.innerText = "AI 正在思考題目...";

                // 2. AI 出題
                const prompt = `提供5個成人旅遊英文單字，避開[${oldWords}]。只給JSON格式: [{"word":"...","def":"...","trans":"..."}]`;
                const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const aiData = await aiRes.json();
                const words = JSON.parse(aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

                // 3. 顯示
                words.forEach(w => {
                    const d = document.createElement('div');
                    d.className = 'quiz';
                    d.onclick = () => {
                        const m = new SpeechSynthesisUtterance(w.word);
                        m.lang = 'en-US';
                        window.speechSynthesis.speak(m);
                    };
                    d.innerHTML = `<p class="word">${w.word} 🔊</p><p>${w.def}</p><p class="ans">${w.trans}</p>`;
                    box.appendChild(d);
                });

                // 4. 存檔
                status.innerText = "正在儲存到雲端...";
                const newList = list.concat(words);
                await fetch(url, {
                    method: "PUT",
                    headers: { Authorization: `token ${CONFIG.TOKEN}` },
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(newList)))),
                        sha: gh.sha
                    })
                });

                status.innerText = "✅ 完成！點擊單字可發音";
                document.getElementById('showBtn').style.display = 'block';

            } catch (e) {
                alert("出錯了: " + e.message);
                status.innerText = "❌ 失敗";
            } finally {
                btn.disabled = false;
            }
        }

        function show() {
            document.querySelectorAll('.ans').forEach(a => a.style.display = 'block');
        }
    </script>
</body>
</html>
