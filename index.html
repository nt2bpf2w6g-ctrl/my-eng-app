<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成人/旅遊英文練習</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        button { width: 90%; padding: 12px; border-radius: 12px; border: none; color: white; cursor: pointer; margin: 5px; font-weight: bold; font-size: 16px; }
        .btn-ai { background: #f39c12; }
        .btn-quiz { background: #34a853; }
        #status { font-size: 12px; color: #888; margin: 10px 0; }
        .quiz-item { text-align: left; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .quiz-word { font-size: 24px; color: #1a73e8; margin: 0; }
        .quiz-def { color: #666; font-size: 14px; margin: 5px 0; }
        .quiz-trans { color: #188038; font-weight: bold; display: none; margin-top: 5px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h3>✈️ 成人/旅遊英文 5 連發</h3>
        <button class="btn-ai" onclick="generateAI(5)">AI 一次出 5 題</button>
        <div id="status"></div>
        <hr>
        <div id="quizContainer"></div>
        <button id="showAllBtn" style="display:none; background:#6c757d" onclick="showAnswers()">顯示所有答案</button>
    </div>

    <script>
        // --- 請務必填入你的資訊 ---
        const CONFIG = {
            GEMINI_KEY: "AIzaSyCX81ohv8BaviqcbaUGO0DWQsO7MC9X2NA",
            GH_TOKEN: "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",
            GH_USER: "nt2bpf2w6g-ctrl",
            GH_REPO: "my-eng-app"
        };

        async function generateAI(count) {
            const status = document.getElementById('status');
            const container = document.getElementById('quizContainer');
            status.innerText = "AI 正在為您規劃 5 個旅遊/生活單字...";
            container.innerHTML = ""; // 清空舊題目

            // 調整 Prompt：一次要 5 題，且要是成人/旅遊相關
            const promptStr = `請隨記提供 5 個適合「成人生活」或「出國旅遊」使用的英文單字或片語。回傳 JSON 格式(不要 Markdown 區塊)，格式為一個陣列：[{"word":"...","def":"英文解釋","trans":"中文翻譯"}, ...]`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({contents: [{parts: [{text: promptStr}]}]})
                });
                const data = await res.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const wordList = JSON.parse(cleanJson);

                wordList.forEach(item => {
                    renderQuiz(item);
                    saveToGithub(item); // 自動存入資料庫
                });

                document.getElementById('showAllBtn').style.display = 'block';
                status.innerText = `✅ 成功生成 ${count} 題並已存入資料庫`;
            } catch (e) {
                status.innerText = "❌ 發生錯誤，請檢查金鑰或內容格式";
                console.error(e);
            }
        }

        function renderQuiz(item) {
            const container = document.getElementById('quizContainer');
            const div = document.createElement('div');
            div.className = 'quiz-item';
            div.innerHTML = `
                <p class="quiz-word">${item.word}</p>
                <p class="quiz-def"><b>Definition:</b> ${item.def}</p>
                <p class="quiz-trans">中文解釋：${item.trans}</p>
            `;
            container.appendChild(div);
        }

        function showAnswers() {
            const trans = document.querySelectorAll('.quiz-trans');
            trans.forEach(el => el.style.display = 'block');
        }

        async function saveToGithub(newObj) {
            const url = `https://api.github.com/repos/${CONFIG.GH_USER}/${CONFIG.GH_REPO}/contents/words.json`;
            try {
                const get = await fetch(url, { headers: { Authorization: `token ${CONFIG.GH_TOKEN}` } });
                const gh = await get.json();
                const list = JSON.parse(atob(gh.content));
                list.push(newObj);
                await fetch(url, {
                    method: "PUT",
                    headers: { Authorization: `token ${CONFIG.GH_TOKEN}` },
                    body: JSON.stringify({
                        message: `Add ${newObj.word}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(list, null, 2)))),
                        sha: gh.sha
                    })
                });
            } catch (e) { console.error("儲存失敗", e); }
        }
    </script>
</body>
</html>
